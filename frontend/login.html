<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SiteFlash AI</title>
  <meta name="description" content="Entre na sua conta SiteFlash AI e crie sites profissionais em segundos.">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-0);
      overflow: hidden;
    }

    /* Orbs de background */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.12;
      pointer-events: none;
    }
    .bg-orb-1 { width: 600px; height: 600px; background: #6366f1; top: -200px; right: -200px; }
    .bg-orb-2 { width: 400px; height: 400px; background: #ec4899; bottom: -100px; left: -100px; }

    .auth-container {
      width: 100%;
      max-width: 440px;
      padding: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .auth-card {
      background: var(--bg-1);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .auth-logo-icon {
      width: 48px;
      height: 48px;
      background: var(--brand-gradient);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }

    .auth-logo-text {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--text-primary);
    }

    .auth-logo-text span {
      background: var(--brand-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .auth-subtitle {
      color: var(--text-muted);
      text-align: center;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .auth-divider {
      text-align: center;
      position: relative;
      margin: 1.5rem 0;
    }

    .auth-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border);
    }

    .auth-divider span {
      position: relative;
      background: var(--bg-1);
      padding: 0 0.75rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .auth-footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .auth-footer-link a {
      color: var(--brand-primary);
      font-weight: 600;
      text-decoration: none;
    }

    .auth-footer-link a:hover {
      text-decoration: underline;
    }

    .btn-submit {
      width: 100%;
      padding: 0.875rem;
      font-size: 1rem;
    }

    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      color: #ef4444;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
    }

    .error-banner.visible { display: block; }

    .features-strip {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.775rem;
      color: var(--text-muted);
    }

    .feature-icon {
      color: var(--success);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <a href="/" class="auth-logo">
        <div class="auth-logo-icon">⚡</div>
        <div class="auth-logo-text">Site<span>Flash</span> AI</div>
      </a>

      <h1 class="auth-title">Bem-vindo de volta!</h1>
      <p class="auth-subtitle">Entre na sua conta para continuar criando sites incríveis</p>

      <!-- Error Banner -->
      <div class="error-banner" id="errorBanner"></div>

      <!-- Login Form -->
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="seu@email.com.br" 
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Senha</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="••••••••" 
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">
          Entrar na Conta
        </button>
      </form>

      <div class="auth-footer-link">
        Não tem conta? <a href="register.html">Criar conta grátis →</a>
      </div>

      <div class="features-strip">
        <div class="feature-item">
          <span class="feature-icon">✓</span>
          <span>Grátis para começar</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">✓</span>
          <span>Sem cartão de crédito</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">✓</span>
          <span>Cancele quando quiser</span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redireciona se já logado
    if (API.Auth.isLoggedIn()) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const errorBanner = document.getElementById('errorBanner');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Loading state
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="loading-spinner"></span> Entrando...';
      errorBanner.classList.remove('visible');

      try {
        const response = await API.Auth.login(email, password);
        
        // Salva token e user
        API.setToken(response.token);
        API.setUser(response.user);
        
        showToast('Login realizado! Redirecionando...', 'success');
        
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 800);

      } catch (error) {
        errorBanner.textContent = error.error || 'Erro ao fazer login. Tente novamente.';
        errorBanner.classList.add('visible');
        
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Entrar na Conta';
      }
    });
  </script>
</body>
</html>
