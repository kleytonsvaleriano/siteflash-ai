version: '3.8'

# =====================================================
# SiteFlash AI - EasyPanel Docker Compose Stack
# Para usar: EasyPanel > Projeto > "+" > Docker Compose
# =====================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Substitua pela senha real do seu PostgreSQL (ver credenciais no EasyPanel)
      DATABASE_URL: postgres://postgres:${DB_PASSWORD}@${DB_HOST}:5432/pixelize?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      MAX_FILE_SIZE: 5242880
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  uploads_data:
